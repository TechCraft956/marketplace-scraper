name: marketplace-scraper

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: dealscope-api:local
    container_name: dealscope_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://dealscope_mongo:27017
      - DB_NAME=dealscope
    volumes:
      # Cookies for Playwright auth — place fb_cookies.json here before scraping
      - ./data/cookies:/app/cookies
      # SQLite fallback storage and any module output
      - ./data/storage:/app/storage
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: dealscope_mongo
    restart: unless-stopped
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
